workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      vars:
        BASE_URL: "https://portfolioproject-production-2b3b.up.railway.app"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk